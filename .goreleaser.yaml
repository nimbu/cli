version: 2

project_name: nimbu

before:
  hooks:
    - go mod tidy

builds:
  - id: nimbu
    main: ./cmd/nimbu-cli
    binary: nimbu
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
    ldflags:
      - -s -w
      - -X github.com/nimbu/cli/internal/cmd.version={{.Version}}
      - -X github.com/nimbu/cli/internal/cmd.commit={{.Commit}}
      - -X github.com/nimbu/cli/internal/cmd.date={{.Date}}

  - id: nimbu_darwin
    main: ./cmd/nimbu-cli
    binary: nimbu
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w
      - -X github.com/nimbu/cli/internal/cmd.version={{.Version}}
      - -X github.com/nimbu/cli/internal/cmd.commit={{.Commit}}
      - -X github.com/nimbu/cli/internal/cmd.date={{.Date}}

archives:
  - ids:
      - nimbu
      - nimbu_darwin
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: nimbu
    repository:
      owner: nimbu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/nimbu/nimbu-go-cli
    description: CLI for the Nimbu API
    license: MIT
    install: |
      bin.install "nimbu"
    test: |
      system "#{bin}/nimbu", "version"
