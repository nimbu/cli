version: 2

project_name: nimbu

before:
  hooks:
    - go mod tidy

builds:
  - id: nimbu
    main: ./cmd/nimbu-cli
    binary: nimbu
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/nimbu/cli/internal/cmd.version={{ .Tag }}
      - -X github.com/nimbu/cli/internal/cmd.commit={{ .ShortCommit }}
      - -X github.com/nimbu/cli/internal/cmd.date={{ .Date }}

  - id: nimbu-darwin
    main: ./cmd/nimbu-cli
    binary: nimbu
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/nimbu/cli/internal/cmd.version={{ .Tag }}
      - -X github.com/nimbu/cli/internal/cmd.commit={{ .ShortCommit }}
      - -X github.com/nimbu/cli/internal/cmd.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

homebrew_casks:
  - name: nimbu
    ids:
      - default
    binaries:
      - nimbu
    repository:
      owner: nimbu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/nimbu/nimbu-go-cli
    description: CLI for the Nimbu API
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nimbu"]
          end
