pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.go"
      run: make fmt-check
    lint:
      glob: "*.go"
      run: make lint

pre-push:
  parallel: true
  commands:
    test:
      # git sets GIT_DIR/GIT_INDEX_FILE for hooks; in linked worktrees these
      # leak into test subprocesses and break git-in-tempdir tests
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE make test
